<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Commodities</title>

<style>
html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    color:#222;
}

.commodities-box{
    width:100%;
    max-width:900px;
    box-sizing:border-box;
    padding:0;
}

.title{
    font-size:11px;
    font-weight:bold;
    letter-spacing:.8px;
    margin-bottom:6px;
    line-height:1.1;
    color:#222;
}

.commodities-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px 10px;
}

.commodity-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:5px 4px;
    border-bottom:1px solid rgba(100,100,100,.22);
    font-size:11px;
    line-height:1.15;
}

.left{
    display:flex;
    align-items:center;
    gap:6px;
    flex:1;
    min-width:0;
}

.name{
    font-size:11px;
    font-weight:bold;
    white-space:nowrap;
}

.symbol{
    font-size:10px;
    color:#777;
    white-space:nowrap;
}

.price{
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    text-align:right;
}

.change{
    width:62px;
    text-align:right;
    font-size:10.5px;
    font-weight:bold;
    white-space:nowrap;
}

.loading{
    font-size:11px;
    color:#777;
}

.green{ color:#008000; }
.red{ color:#c00000; }
.neutral{ color:#777; }

@media(max-width:600px){
    .commodities-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .commodity-row{
        font-size:10px;
    }

    .name{
        font-size:10px;
    }

    .symbol{
        font-size:9px;
    }

    .price{
        font-size:11px;
    }

    .change{
        width:58px;
        font-size:9.5px;
    }
}
</style>
</head>

<body>

<div class="commodities-box">

<div class="title">
🥇 COMMODITIES
</div>

<div id="commodities" class="commodities-grid">
<span class="loading">Načítavam dáta...</span>
</div>

</div>

<script>
const commodities = [
    { name:"Gold", symbol:"GC", stooq:"gc.f" },
    { name:"Silver", symbol:"SI", stooq:"si.f" },
    { name:"Crude Oil", symbol:"WTI", stooq:"cl.f" },
    { name:"Natural Gas", symbol:"NG", stooq:"ng.f" },
    { name:"Copper", symbol:"HG", stooq:"hg.f" },
    { name:"Wheat", symbol:"ZW", stooq:"zw.f" },
    { name:"Corn", symbol:"ZC", stooq:"zc.f" },
    { name:"Soybeans", symbol:"ZS", stooq:"zs.f" }
];

async function loadCommodities(){

    const symbols = commodities.map(c => c.stooq).join(",");

    const stooqUrl =
        "https://stooq.com/q/l/?s=" +
        symbols +
        "&f=sd2t2ohlcv&h&e=csv";

    const proxyUrl =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(stooqUrl);

    try{

        const response = await fetch(proxyUrl);
        const csv = await response.text();

        const rows = csv.trim().split("\n").slice(1);

        let html = "";

        rows.forEach(row => {

            const cols = row.split(",");

            const symbolRaw = cols[0];
            const open = parseFloat(cols[3]);
            const close = parseFloat(cols[6]);

            const item = commodities.find(c =>
                c.stooq.toLowerCase() === symbolRaw.toLowerCase()
            );

            if(!item || isNaN(close)) return;

            let changePercent = 0;

            if(!isNaN(open) && open !== 0){
                changePercent = ((close - open) / open) * 100;
            }

            let cls = "neutral";
            let arrow = "";

            if(changePercent > 0){
                cls = "green";
                arrow = "▲";
            }

            if(changePercent < 0){
                cls = "red";
                arrow = "▼";
            }

            html += `

<div class="commodity-row">

    <div class="left">
        <span class="name">${item.name}</span>
        <span class="symbol">(${item.symbol})</span>
    </div>

    <div class="price">
        ${formatPrice(close)}
    </div>

    <div class="change ${cls}">
        ${arrow} ${changePercent.toFixed(2)}%
    </div>

</div>

`;

        });

        document.getElementById("commodities").innerHTML =
            html || '<span class="loading">Data momentálne nedostupné</span>';

    }

    catch(error){

        document.getElementById("commodities").innerHTML =
            '<span class="loading">Data momentálne nedostupné</span>';

    }
}

function formatPrice(value){

    if(!value || isNaN(value)){
        return "--";
    }

    if(value >= 1000){
        return "$" + value.toLocaleString("en-US",{
            maximumFractionDigits:2
        });
    }

    return "$" + value.toFixed(2);
}

loadCommodities();

setInterval(loadCommodities,300000);
</script>

</body>
</html>
