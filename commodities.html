<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Commodities</title>

<style>
html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    color:#222;
}

.commodities-box{
    width:100%;
    max-width:900px;
    box-sizing:border-box;
    padding:0;
}

.title{
    font-size:11px;
    font-weight:bold;
    letter-spacing:.8px;
    margin-bottom:6px;
    line-height:1.1;
    color:#222;
}

.commodities-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px 10px;
}

.commodity-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:5px 4px;
    border-bottom:1px solid rgba(100,100,100,.22);
    font-size:11px;
    line-height:1.15;
}

.left{
    display:flex;
    align-items:center;
    gap:6px;
    flex:1;
    min-width:0;
}

.name{
    font-size:11px;
    font-weight:bold;
    white-space:nowrap;
}

.symbol{
    font-size:10px;
    color:#777;
    white-space:nowrap;
}

.price{
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    text-align:right;
}

.change{
    width:62px;
    text-align:right;
    font-size:10.5px;
    font-weight:bold;
    white-space:nowrap;
}

.loading{
    font-size:11px;
    color:#777;
}

.green{ color:#008000; }
.red{ color:#c00000; }
.neutral{ color:#777; }

@media(max-width:600px){

    .commodities-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .commodity-row{
        font-size:10px;
    }

    .name{
        font-size:10px;
    }

    .symbol{
        font-size:9px;
    }

    .price{
        font-size:11px;
    }

    .change{
        width:58px;
        font-size:9.5px;
    }

}
</style>
</head>

<body>

<div class="commodities-box">

<div class="title">
🥇 COMMODITIES
</div>

<div id="commodities" class="commodities-grid">
<span class="loading">Načítavam dáta...</span>
</div>

</div>

<script>
const commodities = [

    {
        name:"Gold",
        symbol:"GC",
        yahoo:"GC=F"
    },

    {
        name:"Silver",
        symbol:"SI",
        yahoo:"SI=F"
    },

    {
        name:"Crude Oil",
        symbol:"WTI",
        yahoo:"CL=F"
    },

    {
        name:"Brent Oil",
        symbol:"BRENT",
        yahoo:"BZ=F"
    },

    {
        name:"Natural Gas",
        symbol:"NG",
        yahoo:"NG=F"
    },

    {
        name:"Copper",
        symbol:"HG",
        yahoo:"HG=F"
    },

    {
        name:"Wheat",
        symbol:"ZW",
        yahoo:"ZW=F"
    },

    {
        name:"Corn",
        symbol:"ZC",
        yahoo:"ZC=F"
    }

];

async function loadCommodities(){

    let html = "";

    for(const c of commodities){

        try{

            const url =
            "https://query1.finance.yahoo.com/v8/finance/chart/" +
            encodeURIComponent(c.yahoo) +
            "?interval=1d&range=5d";

            const response = await fetch(url);
            const data = await response.json();

            const result = data.chart.result[0];
            const meta = result.meta;

            let price = meta.regularMarketPrice;
            let previousClose = meta.previousClose;

            if(!previousClose && result.indicators.quote[0].close.length > 1){
                const closes = result.indicators.quote[0].close.filter(v => v !== null);
                previousClose = closes[closes.length - 2];
            }

            let changePercent = 0;

            if(price && previousClose){
                changePercent = ((price - previousClose) / previousClose) * 100;
            }

            let cls = "neutral";
            let arrow = "";

            if(changePercent > 0){
                cls = "green";
                arrow = "▲";
            }

            if(changePercent < 0){
                cls = "red";
                arrow = "▼";
            }

            html += `

<div class="commodity-row">

    <div class="left">
        <span class="name">${c.name}</span>
        <span class="symbol">(${c.symbol})</span>
    </div>

    <div class="price">
        ${formatPrice(price)}
    </div>

    <div class="change ${cls}">
        ${arrow} ${changePercent.toFixed(2)}%
    </div>

</div>

`;

        }

        catch(error){

            html += `

<div class="commodity-row">

    <div class="left">
        <span class="name">${c.name}</span>
        <span class="symbol">(${c.symbol})</span>
    </div>

    <div class="price neutral">
        --
    </div>

    <div class="change neutral">
        --
    </div>

</div>

`;

        }

    }

    document.getElementById("commodities").innerHTML = html;

}

function formatPrice(value){

    if(!value){
        return "--";
    }

    if(value >= 1000){
        return "$" + value.toLocaleString("en-US",{
            maximumFractionDigits:2
        });
    }

    return "$" + value.toFixed(2);

}

loadCommodities();

setInterval(loadCommodities,300000);
</script>

</body>
</html>
