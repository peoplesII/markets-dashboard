<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GAPE Commodities</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    .commodities-box {
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
      padding: 0;
    }

    .title {
      margin-bottom: 6px;
      color: #222;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.8px;
      line-height: 1.1;
    }

    .commodities-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 10px;
    }

    .commodity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 4px;
      border-bottom: 1px solid rgba(100, 100, 100, 0.22);
      font-size: 11px;
      line-height: 1.15;
    }

    .left {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .name {
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }

    .symbol {
      color: #777;
      font-size: 10px;
      white-space: nowrap;
    }

    .price {
      font-size: 12px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .change {
      width: 62px;
      font-size: 10.5px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .loading {
      padding: 5px 4px;
      color: #777;
      font-size: 11px;
    }

    .updated {
      margin-top: 5px;
      color: #999;
      font-size: 8px;
      text-align: right;
    }

    .green {
      color: #008000;
    }

    .red {
      color: #c00000;
    }

    .neutral {
      color: #777;
    }

    @media (max-width: 600px) {
      .commodity-row {
        font-size: 10px;
      }

      .name {
        font-size: 10px;
      }

      .symbol {
        font-size: 9px;
      }

      .price {
        font-size: 11px;
      }

      .change {
        width: 58px;
        font-size: 9.5px;
      }
    }
  </style>
</head>

<body>

  <div class="commodities-box">

    <div class="title">🥇 COMMODITIES</div>

    <div id="commodities" class="commodities-grid">
      <span class="loading">Načítavam dáta...</span>
    </div>

    <div id="updated" class="updated"></div>

  </div>

  <script>
    "use strict";

    const commodities = [
      {
        name: "Gold",
        symbol: "GC",
        yahoo: "GC=F",
        unit: "$"
      },
      {
        name: "Silver",
        symbol: "SI",
        yahoo: "SI=F",
        unit: "$"
      },
      {
        name: "Crude Oil",
        symbol: "WTI",
        yahoo: "CL=F",
        unit: "$"
      },
      {
        name: "Natural Gas",
        symbol: "NG",
        yahoo: "NG=F",
        unit: "$"
      },
      {
        name: "Copper",
        symbol: "HG",
        yahoo: "HG=F",
        unit: "$"
      },
      {
        name: "Wheat",
        symbol: "ZW",
        yahoo: "ZW=F",
        unit: "¢"
      },
      {
        name: "Corn",
        symbol: "ZC",
        yahoo: "ZC=F",
        unit: "¢"
      },
      {
        name: "Soybeans",
        symbol: "ZS",
        yahoo: "ZS=F",
        unit: "¢"
      }
    ];

    /*
     * Yahoo Finance nepovoľuje priame volanie z GitHub Pages.
     * Preto sa použijú záložné CORS proxy servery.
     */
    const proxyBuilders = [
      function (url) {
        return (
          "https://corsproxy.io/?url=" +
          encodeURIComponent(url)
        );
      },

      function (url) {
        return (
          "https://api.allorigins.win/raw?url=" +
          encodeURIComponent(url)
        );
      },

      function (url) {
        return (
          "https://r.jina.ai/http://" +
          url.replace(/^https?:\/\//, "")
        );
      }
    ];

    function fetchWithTimeout(url, timeout) {
      const controller = new AbortController();

      const timer = setTimeout(function () {
        controller.abort();
      }, timeout);

      return fetch(url, {
        cache: "no-store",
        signal: controller.signal
      }).finally(function () {
        clearTimeout(timer);
      });
    }

    async function fetchJsonWithFallback(url) {
      const errors = [];

      for (const buildProxyUrl of proxyBuilders) {
        try {
          const proxyUrl = buildProxyUrl(url);

          const response = await fetchWithTimeout(
            proxyUrl,
            12000
          );

          if (!response.ok) {
            throw new Error(
              "HTTP " + response.status
            );
          }

          let text = await response.text();

          /*
           * Jina AI pridáva pred JSON krátky textový nadpis.
           * Odstránime ho pred spracovaním JSON.
           */
          if (proxyUrl.includes("r.jina.ai")) {
            const marker =
              text.indexOf("Markdown Content:");

            if (marker !== -1) {
              text = text
                .substring(marker + 17)
                .trim();
            }
          }

          const firstBrace = text.indexOf("{");

          if (firstBrace > 0) {
            text = text.substring(firstBrace);
          }

          const data = JSON.parse(text);

          if (
            !data ||
            !data.chart ||
            !data.chart.result ||
            !data.chart.result[0]
          ) {
            throw new Error(
              "Neplatná odpoveď API"
            );
          }

          return data;
        } catch (error) {
          errors.push(error.message);
        }
      }

      throw new Error(
        errors.join(" | ")
      );
    }

    async function loadCommodity(item) {
      const yahooUrl =
        "https://query1.finance.yahoo.com/v8/finance/chart/" +
        encodeURIComponent(item.yahoo) +
        "?range=5d&interval=1d&_=" +
        Date.now();

      const data =
        await fetchJsonWithFallback(yahooUrl);

      const result =
        data.chart.result[0];

      const meta =
        result.meta;

      if (
        !meta ||
        meta.symbol !== item.yahoo
      ) {
        throw new Error(
          "Neplatné dáta pre " + item.yahoo
        );
      }

      let price =
        Number(meta.regularMarketPrice);

      let previousClose =
        Number(meta.chartPreviousClose);

      /*
       * Ak meta údaje nemajú cenu, použijeme
       * poslednú platnú dennú zatváraciu cenu.
       */
      if (!Number.isFinite(price)) {
        const quote =
          result.indicators &&
          result.indicators.quote &&
          result.indicators.quote[0];

        if (quote && quote.close) {
          for (
            let i = quote.close.length - 1;
            i >= 0;
            i--
          ) {
            const close =
              Number(quote.close[i]);

            if (Number.isFinite(close)) {
              price = close;
              break;
            }
          }
        }
      }

      if (!Number.isFinite(price)) {
        throw new Error(
          "Neplatná cena pre " + item.yahoo
        );
      }

      /*
       * Ak Yahoo neposlalo previous close,
       * použijeme predposlednú dennú cenu.
       */
      if (
        !Number.isFinite(previousClose) ||
        previousClose === 0
      ) {
        const quote =
          result.indicators &&
          result.indicators.quote &&
          result.indicators.quote[0];

        if (quote && quote.close) {
          const validCloses =
            quote.close
              .map(Number)
              .filter(Number.isFinite);

          if (validCloses.length >= 2) {
            previousClose =
              validCloses[
                validCloses.length - 2
              ];
          }
        }
      }

      let changePercent = null;

      if (
        Number.isFinite(previousClose) &&
        previousClose !== 0
      ) {
        changePercent =
          (
            (price - previousClose) /
            previousClose
          ) * 100;
      }

      return {
        name: item.name,
        symbol: item.symbol,
        yahoo: item.yahoo,
        unit: item.unit,
        price: price,
        changePercent: changePercent
      };
    }

    async function loadCommodities() {
      const container =
        document.getElementById("commodities");

      const updated =
        document.getElementById("updated");

      updated.textContent =
        "Aktualizujem...";

      try {
        const results =
          await Promise.allSettled(
            commodities.map(function (item) {
              return loadCommodity(item);
            })
          );

        const rows = results
          .filter(function (result) {
            return result.status === "fulfilled";
          })
          .map(function (result) {
            return result.value;
          });

        if (rows.length === 0) {
          container.innerHTML =
            '<span class="loading">' +
            "Dáta momentálne nedostupné" +
            "</span>";

          updated.textContent =
            "Načítanie zlyhalo";

          return;
        }

        container.innerHTML =
          rows
            .map(renderCommodity)
            .join("");

        /*
         * Ak niektorý symbol zlyhal,
         * zobrazíme ho ako N/A.
         */
        const loadedSymbols =
          new Set(
            rows.map(function (item) {
              return item.yahoo;
            })
          );

        const missingRows =
          commodities
            .filter(function (item) {
              return !loadedSymbols.has(
                item.yahoo
              );
            })
            .map(renderMissingCommodity)
            .join("");

        container.innerHTML +=
          missingRows;

        updated.textContent =
          "Aktualizované: " +
          new Date().toLocaleTimeString(
            "sk-SK",
            {
              hour: "2-digit",
              minute: "2-digit"
            }
          );
      } catch (error) {
        console.error(
          "Commodities chyba:",
          error
        );

        container.innerHTML =
          '<span class="loading">' +
          "Dáta momentálne nedostupné" +
          "</span>";

        updated.textContent =
          "Načítanie zlyhalo";
      }
    }

    function renderCommodity(item) {
      let colorClass = "neutral";
      let arrow = "•";
      let changeText = "N/A";

      if (
        Number.isFinite(item.changePercent)
      ) {
        changeText =
          item.changePercent.toFixed(2) +
          "%";

        if (item.changePercent > 0) {
          colorClass = "green";
          arrow = "▲";
        } else if (
          item.changePercent < 0
        ) {
          colorClass = "red";
          arrow = "▼";
        }
      }

      return `
        <div class="commodity-row">
          <div class="left">
            <span class="name">${item.name}</span>
            <span class="symbol">(${item.symbol})</span>
          </div>

          <div class="price">
            ${formatPrice(item.price, item.unit)}
          </div>

          <div class="change ${colorClass}">
            ${arrow} ${changeText}
          </div>
        </div>
      `;
    }

    function renderMissingCommodity(item) {
      return `
        <div class="commodity-row">
          <div class="left">
            <span class="name">${item.name}</span>
            <span class="symbol">(${item.symbol})</span>
          </div>

          <div class="price neutral">
            N/A
          </div>

          <div class="change neutral">
            N/A
          </div>
        </div>
      `;
    }

    function formatPrice(value, unit) {
      if (!Number.isFinite(value)) {
        return "N/A";
      }

      const formatted =
        value.toLocaleString(
          "en-US",
          {
            minimumFractionDigits: 2,
            maximumFractionDigits: 3
          }
        );

      /*
       * Obilniny Yahoo uvádza v centoch za bušel.
       * Ostatné futures zostávajú v USD.
       */
      if (unit === "¢") {
        return formatted + "¢";
      }

      return "$" + formatted;
    }

    loadCommodities();

    setInterval(
      loadCommodities,
      300000
    );
  </script>

</body>
</html>
