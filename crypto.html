<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Crypto Market</title>

<style>
html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    color:#222;
}

.crypto-box{
    width:100%;
    max-width:900px;
    box-sizing:border-box;
    padding:0;
}

.title-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
}

.title{
    font-size:11px;
    font-weight:bold;
    letter-spacing:.8px;
    line-height:1.1;
    color:#222;
    white-space:nowrap;
}

.updated{
    font-size:9px;
    color:#888;
    line-height:1.1;
    text-align:right;
    white-space:nowrap;
}

.crypto-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px 10px;
}

.crypto-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    padding:5px 4px;
    border-bottom:1px solid rgba(100,100,100,.22);
    font-size:11px;
    line-height:1.15;
}

.left{
    display:flex;
    align-items:center;
    gap:6px;
    flex:1;
    min-width:0;
}

.name{
    font-size:11px;
    font-weight:bold;
    white-space:nowrap;
}

.symbol{
    font-size:10px;
    color:#777;
    white-space:nowrap;
}

.price{
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    text-align:right;
}

.change{
    width:62px;
    text-align:right;
    font-size:10.5px;
    font-weight:bold;
    white-space:nowrap;
}

.loading,
.error{
    grid-column:1 / -1;
    padding:5px 4px;
    font-size:11px;
    color:#777;
}

.green{
    color:#008000;
}

.red{
    color:#c00000;
}

.neutral{
    color:#777;
}

@media(max-width:600px){
    .crypto-row{
        font-size:10px;
    }

    .name{
        font-size:10px;
    }

    .symbol{
        font-size:9px;
    }

    .price{
        font-size:11px;
    }

    .change{
        width:58px;
        font-size:9.5px;
    }

    .updated{
        font-size:8.5px;
    }
}
</style>
</head>

<body>

<div class="crypto-box">

    <div class="title-row">

        <div class="title">
            🪙 CRYPTO MARKET
        </div>

        <div id="updated" class="updated">
            Načítavam...
        </div>

    </div>

    <div id="crypto" class="crypto-grid">
        <div class="loading">
            Načítavam dáta...
        </div>
    </div>

</div>

<script>
"use strict";

const coins = [
    {
        id:"bitcoin",
        name:"Bitcoin",
        symbol:"BTC"
    },
    {
        id:"ethereum",
        name:"Ethereum",
        symbol:"ETH"
    },
    {
        id:"ripple",
        name:"XRP",
        symbol:"XRP"
    },
    {
        id:"solana",
        name:"Solana",
        symbol:"SOL"
    },
    {
        id:"binancecoin",
        name:"BNB",
        symbol:"BNB"
    },
    {
        id:"cardano",
        name:"Cardano",
        symbol:"ADA"
    },
    {
        id:"dogecoin",
        name:"Dogecoin",
        symbol:"DOGE"
    },
    {
        id:"avalanche-2",
        name:"Avalanche",
        symbol:"AVAX"
    },
    {
        id:"chainlink",
        name:"Chainlink",
        symbol:"LINK"
    },
    {
        id:"polkadot",
        name:"Polkadot",
        symbol:"DOT"
    }
];

async function loadCrypto(){
    const cryptoElement =
        document.getElementById("crypto");

    const updatedElement =
        document.getElementById("updated");

    updatedElement.textContent =
        "Aktualizujem...";

    const ids =
        coins.map(function(coin){
            return coin.id;
        }).join(",");

    const url =
        "https://api.coingecko.com/api/v3/simple/price" +
        "?ids=" + encodeURIComponent(ids) +
        "&vs_currencies=usd" +
        "&include_24hr_change=true" +
        "&_=" + Date.now();

    try{
        const response = await fetch(url, {
            cache:"no-store"
        });

        if(!response.ok){
            throw new Error(
                "CoinGecko HTTP chyba: " +
                response.status
            );
        }

        const data =
            await response.json();

        let html = "";

        coins.forEach(function(coinInfo){
            const coin =
                data[coinInfo.id];

            if(
                !coin ||
                !Number.isFinite(Number(coin.usd))
            ){
                html += renderMissingCoin(coinInfo);
                return;
            }

            const price =
                Number(coin.usd);

            const change =
                Number(coin.usd_24h_change);

            let colorClass = "neutral";
            let arrow = "•";
            let changeText = "N/A";

            if(Number.isFinite(change)){
                changeText =
                    Math.abs(change).toFixed(2) +
                    "%";

                if(change > 0){
                    colorClass = "green";
                    arrow = "▲";
                }
                else if(change < 0){
                    colorClass = "red";
                    arrow = "▼";
                }
            }

            html += `
                <div class="crypto-row">

                    <div class="left">
                        <span class="name">
                            ${coinInfo.name}
                        </span>

                        <span class="symbol">
                            (${coinInfo.symbol})
                        </span>
                    </div>

                    <div class="price">
                        $${formatPrice(price)}
                    </div>

                    <div class="change ${colorClass}">
                        ${arrow} ${changeText}
                    </div>

                </div>
            `;
        });

        if(!html){
            throw new Error(
                "CoinGecko neposlalo žiadne údaje"
            );
        }

        cryptoElement.innerHTML = html;

        updatedElement.textContent =
            "Aktualizované: " +
            new Date().toLocaleTimeString(
                "sk-SK",
                {
                    hour:"2-digit",
                    minute:"2-digit"
                }
            );
    }
    catch(error){
        console.error(
            "Crypto widget chyba:",
            error
        );

        cryptoElement.innerHTML = `
            <div class="error">
                Dáta momentálne nie sú dostupné.
            </div>
        `;

        updatedElement.textContent =
            "Dáta nedostupné";
    }
}

function renderMissingCoin(coin){
    return `
        <div class="crypto-row">

            <div class="left">
                <span class="name">
                    ${coin.name}
                </span>

                <span class="symbol">
                    (${coin.symbol})
                </span>
            </div>

            <div class="price neutral">
                N/A
            </div>

            <div class="change neutral">
                N/A
            </div>

        </div>
    `;
}

function formatPrice(value){
    if(!Number.isFinite(value)){
        return "N/A";
    }

    if(value >= 1000){
        return value.toLocaleString(
            "en-US",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );
    }

    if(value >= 1){
        return value.toLocaleString(
            "en-US",
            {
                minimumFractionDigits:2,
                maximumFractionDigits:4
            }
        );
    }

    return value.toLocaleString(
        "en-US",
        {
            minimumFractionDigits:4,
            maximumFractionDigits:6
        }
    );
}

loadCrypto();

setInterval(
    loadCrypto,
    60000
);
</script>

</body>
</html>
