<!DOCTYPE html>
<html lang="sk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Crypto Market</title>

<style>

html, body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    color:#222;
}

.crypto-box{
    width:100%;
    max-width:900px;
    box-sizing:border-box;
    padding:0;
}

.title{
    font-size:11px;
    font-weight:bold;
    letter-spacing:.8px;
    margin-bottom:6px;
    line-height:1.1;
    color:#222;
}

.crypto-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px 10px;
}

.crypto-row{

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;

    padding:5px 4px;

    border-bottom:1px solid rgba(100,100,100,.22);

    font-size:11px;
    line-height:1.15;
}

.left{
    display:flex;
    align-items:center;
    gap:6px;
    flex:1;
    min-width:0;
}

.name{
    font-size:11px;
    font-weight:bold;
    white-space:nowrap;
}

.symbol{
    font-size:10px;
    color:#777;
    white-space:nowrap;
}

.price{
    font-size:12px;
    font-weight:bold;
    white-space:nowrap;
    text-align:right;
}

.change{
    width:62px;
    text-align:right;
    font-size:10.5px;
    font-weight:bold;
    white-space:nowrap;
}

.green{
    color:#008000;
}

.red{
    color:#c00000;
}

.neutral{
    color:#777;
}

@media(max-width:600px){

    .crypto-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .crypto-row{
        font-size:10px;
    }

    .name{
        font-size:10px;
    }

    .symbol{
        font-size:9px;
    }

    .price{
        font-size:11px;
    }

    .change{
        width:58px;
        font-size:9.5px;
    }

}

</style>

</head>

<body>

<div class="crypto-box">

<div class="title">
🪙 CRYPTO MARKET
</div>

<div id="crypto" class="crypto-grid">
Načítavam dáta...
</div>

</div>

<script>

const coins=[

{
id:"bitcoin",
name:"Bitcoin",
symbol:"BTC"
},

{
id:"ethereum",
name:"Ethereum",
symbol:"ETH"
},

{
id:"ripple",
name:"XRP",
symbol:"XRP"
},

{
id:"solana",
name:"Solana",
symbol:"SOL"
},

{
id:"binancecoin",
name:"BNB",
symbol:"BNB"
},

{
id:"cardano",
name:"Cardano",
symbol:"ADA"
},

{
id:"dogecoin",
name:"Dogecoin",
symbol:"DOGE"
},

{
id:"avalanche-2",
name:"Avalanche",
symbol:"AVAX"
},

{
id:"chainlink",
name:"Chainlink",
symbol:"LINK"
},

{
id:"polkadot",
name:"Polkadot",
symbol:"DOT"
}

];

async function loadCrypto(){

    const ids=coins.map(c=>c.id).join(",");

    const url=
    "https://api.coingecko.com/api/v3/simple/price?ids="+
    ids+
    "&vs_currencies=usd&include_24hr_change=true";

    try{

        const response=await fetch(url);
        const data=await response.json();

        let html="";

        coins.forEach(c=>{

            let coin=data[c.id];

            if(!coin) return;

            let price=coin.usd;
            let change=coin.usd_24h_change;

            let cls="neutral";
            let arrow="";

            if(change>0){
                cls="green";
                arrow="▲";
            }

            if(change<0){
                cls="red";
                arrow="▼";
            }

            html+=`

<div class="crypto-row">

    <div class="left">

        <span class="name">${c.name}</span>

        <span class="symbol">(${c.symbol})</span>

    </div>

    <div class="price">

        $${formatPrice(price)}

    </div>

    <div class="change ${cls}">

        ${arrow} ${change.toFixed(2)}%

    </div>

</div>

`;

        });

        document.getElementById("crypto").innerHTML=html;

    }

    catch(error){

        document.getElementById("crypto").innerHTML="Data momentálne nedostupné";

    }

}

function formatPrice(value){

    if(value>=1000){

        return value.toLocaleString("en-US",{
            maximumFractionDigits:2
        });

    }

    return value.toFixed(4);

}

loadCrypto();

setInterval(loadCrypto,60000);

</script>

</body>

</html>
