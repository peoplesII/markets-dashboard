<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Crypto Market</title>

<style>

html, body {

margin:0;
padding:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;

}


.crypto-box {

width:100%;
max-width:900px;

}


.title {

font-size:14px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:8px;
color:#222;

}


.crypto-grid {

display:grid;
grid-template-columns:repeat(2, 1fr);
gap:4px 15px;

}


.crypto-row {

display:flex;
justify-content:space-between;
align-items:center;

padding:6px 4px;

border-bottom:1px solid rgba(100,100,100,0.2);

font-size:13px;

}


.left {

display:flex;
gap:8px;

}


.name {

font-weight:bold;

}


.symbol {

color:#777;

}


.price {

font-weight:bold;
text-align:right;

}


.change {

width:70px;
text-align:right;

}


.green {

color:#008000;

}


.red {

color:#c00000;

}


.neutral {

color:#777;

}


@media(max-width:600px){

.crypto-grid {

grid-template-columns:1fr;

}


.crypto-row {

font-size:12px;

}

}


</style>


</head>


<body>


<div class="crypto-box">


<div class="title">
🪙 CRYPTO MARKET
</div>


<div id="crypto" class="crypto-grid">

Načítavam dáta...

</div>


</div>



<script>


const coins = [

{
id:"bitcoin",
name:"Bitcoin",
symbol:"BTC/USD"
},

{
id:"ethereum",
name:"Ethereum",
symbol:"ETH/USD"
},

{
id:"ripple",
name:"XRP",
symbol:"XRP/USD"
},

{
id:"solana",
name:"Solana",
symbol:"SOL/USD"
},

{
id:"binancecoin",
name:"BNB",
symbol:"BNB/USD"
},

{
id:"cardano",
name:"Cardano",
symbol:"ADA/USD"
},

{
id:"dogecoin",
name:"Dogecoin",
symbol:"DOGE/USD"
},

{
id:"avalanche-2",
name:"Avalanche",
symbol:"AVAX/USD"
},

{
id:"chainlink",
name:"Chainlink",
symbol:"LINK/USD"
},

{
id:"polkadot",
name:"Polkadot",
symbol:"DOT/USD"
}

];



async function loadCrypto(){


const ids = coins.map(c=>c.id).join(",");


const url = 
"https://api.coingecko.com/api/v3/simple/price?ids="
+ids+
"&vs_currencies=usd&include_24hr_change=true";



try{


const response = await fetch(url);


const data = await response.json();



let html="";



coins.forEach(c=>{


let coin=data[c.id];


if(!coin) return;



let price = coin.usd;


let change = coin.usd_24h_change;



let cls="neutral";


let arrow="";



if(change>0){

cls="green";
arrow="▲";

}


if(change<0){

cls="red";
arrow="▼";

}



html += `


<div class="crypto-row">


<div class="left">

<span class="name">
${c.name}
</span>


<span class="symbol">
${c.symbol}
</span>


</div>


<div class="price">

$${formatPrice(price)}

</div>


<div class="change ${cls}">

${arrow} ${change.toFixed(2)}%

</div>


</div>


`;



});



document.getElementById("crypto").innerHTML=html;



}

catch(error){


document.getElementById("crypto").innerHTML =
"Data momentálne nedostupné";


}



}



function formatPrice(value){


if(value>=1000){

return value.toLocaleString("en-US",
{
maximumFractionDigits:2
});

}


return value.toFixed(4);


}



loadCrypto();


setInterval(loadCrypto,60000);



</script>


</body>

</html>
