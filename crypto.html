<style>

html, body {

margin:0;
padding:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;

}


.crypto-grid {

display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:5px;

}


.crypto-card {

height:55px;
border-bottom:1px solid rgba(120,120,120,0.25);
overflow:hidden;

}


@media(max-width:600px){

.crypto-grid {

grid-template-columns:repeat(2,1fr);

}

}

</style>

</head>

{

"width":"100%",
"height":"55",
"dateRange":"1D",
