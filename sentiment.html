<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Market Sentiment</title>

<style>

html, body {

margin:0;
padding:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
color:#222;

}


.container {

width:100%;
max-width:900px;

}


.title {

font-size:12px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:10px;

}


.grid {

display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;

}


.card {

border-bottom:1px solid rgba(100,100,100,0.25);
padding:8px;

}


.label {

font-size:12px;
color:#777;

}


.value {

font-size:12px;
font-weight:bold;
margin-top:5px;

}


.status {

font-size:12px;
font-weight:bold;
margin-top:4px;

}


.green {

color:#008000;

}


.red {

color:#c00000;

}


.orange {

color:#c87800;

}



.meter {

height:12px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;

}


.progress {

height:100%;
width:65%;
background:#4caf50;

}


.scale {

display:flex;
justify-content:space-between;
font-size:11px;
margin-top:5px;
color:#666;

}



@media(max-width:600px){

.grid {

grid-template-columns:1fr;

}


.value {

font-size:12px;

}

}


</style>


</head>


<body>


<div class="container">


<div class="title">
📊 MARKET SENTIMENT
</div>



<div class="grid">


<div class="card">

<div class="label">
Crypto Fear & Greed
</div>

<div id="cryptoValue" class="value">
--
</div>

<div id="cryptoStatus" class="status">
Loading...
</div>

</div>



<div class="card">

<div class="label">
VIX Fear Index
</div>

<div class="value">
17.45
</div>

<div class="status green">
LOW VOLATILITY
</div>

</div>



<div class="card">

<div class="label">
Investor Mood
</div>

<div class="value">
Positive
</div>

<div class="status green">
RISK ON 🟢
</div>

</div>



<div class="card">

<div class="label">
Market Condition
</div>

<div class="value">
Greed
</div>

<div class="status orange">
Watch Levels
</div>

</div>


</div>



<div class="card" style="margin-top:10px;">


<div class="label">
Fear → Greed Meter
</div>


<div class="meter">

<div id="meter" class="progress"></div>

</div>


<div class="scale">

<span>Extreme Fear</span>
<span>Neutral</span>
<span>Extreme Greed</span>

</div>


</div>



</div>





<script>


async function loadCryptoFear(){


try{


const response =
await fetch("https://api.alternative.me/fng/");


const data =
await response.json();


const value =
Number(data.data[0].value);



document.getElementById("cryptoValue").innerHTML =
value;



let text="";
let color="";



if(value < 25){

text="EXTREME FEAR 🔴";
color="red";

}

else if(value < 50){

text="FEAR";

color="orange";

}

else if(value < 75){

text="GREED 🟢";
color="green";

}

else{

text="EXTREME GREED 🔥";
color="red";

}



let status =
document.getElementById("cryptoStatus");


status.innerHTML=text;

status.className="status "+color;



document.getElementById("meter").style.width =
value+"%";



}

catch(e){


document.getElementById("cryptoStatus").innerHTML =
"Data unavailable";


}



}



loadCryptoFear();


setInterval(loadCryptoFear,60000);



</script>


</body>

</html>
