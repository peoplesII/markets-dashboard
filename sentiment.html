<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Market Sentiment</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:transparent;
  font-family:Arial, Helvetica, sans-serif;
  color:#222;
}

.container {
  width:100%;
  max-width:900px;
  box-sizing:border-box;
  padding:0;
}

.title {
  font-size:11px;
  font-weight:bold;
  letter-spacing:0.8px;
  margin-bottom:6px;
  line-height:1.1;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px 10px;
}

.card {
  border-bottom:1px solid rgba(100,100,100,0.22);
  padding:5px 4px;
}

.row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  line-height:1.15;
}

.label {
  font-size:11px;
  color:#777;
  white-space:nowrap;
}

.value {
  font-size:12px;
  font-weight:bold;
  white-space:nowrap;
}

.status {
  font-size:10.5px;
  font-weight:bold;
  margin-top:3px;
  text-align:right;
  line-height:1.1;
}

.green { color:#008000; }
.red { color:#c00000; }
.orange { color:#c87800; }

.meter-card {
  margin-top:6px;
  padding:5px 4px 0 4px;
  border-bottom:none;
}

.meter-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:4px;
}

.meter {
  height:8px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress {
  height:100%;
  width:65%;
  background:#4caf50;
}

.scale {
  display:flex;
  justify-content:space-between;
  font-size:9.5px;
  margin-top:3px;
  color:#666;
  line-height:1.1;
}

@media(max-width:600px){
  .grid {
    grid-template-columns:repeat(2,1fr);
  }

  .label {
    font-size:10px;
  }

  .value {
    font-size:11px;
  }

  .status {
    font-size:9.5px;
  }

  .scale {
    font-size:9px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">📊 MARKET SENTIMENT</div>

  <div class="grid">

    <div class="card">
      <div class="row">
        <div class="label">Crypto F&G</div>
        <div id="cryptoValue" class="value">--</div>
      </div>
      <div id="cryptoStatus" class="status">Loading...</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">VIX</div>
        <div class="value">17.45</div>
      </div>
      <div class="status green">LOW VOLATILITY</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">Investor Mood</div>
        <div class="value">Positive</div>
      </div>
      <div class="status green">RISK ON 🟢</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">Condition</div>
        <div class="value">Greed</div>
      </div>
      <div class="status orange">Watch Levels</div>
    </div>

  </div>

  <div class="meter-card">
    <div class="meter-header">
      <div class="label">Fear → Greed Meter</div>
    </div>

    <div class="meter">
      <div id="meter" class="progress"></div>
    </div>

    <div class="scale">
      <span>Extreme Fear</span>
      <span>Neutral</span>
      <span>Extreme Greed</span>
    </div>
  </div>

</div>

<script>
async function loadCryptoFear(){
  try{
    const response = await fetch("https://api.alternative.me/fng/");
    const data = await response.json();
    const value = Number(data.data[0].value);

    document.getElementById("cryptoValue").innerHTML = value;

    let text = "";
    let color = "";

    if(value < 25){
      text = "EXTREME FEAR 🔴";
      color = "red";
    }
    else if(value < 50){
      text = "FEAR";
      color = "orange";
    }
    else if(value < 75){
      text = "GREED 🟢";
      color = "green";
    }
    else{
      text = "EXTREME GREED 🔥";
      color = "red";
    }

    let status = document.getElementById("cryptoStatus");
    status.innerHTML = text;
    status.className = "status " + color;

    document.getElementById("meter").style.width = value + "%";
  }
  catch(e){
    document.getElementById("cryptoStatus").innerHTML = "Data unavailable";
  }
}

loadCryptoFear();
setInterval(loadCryptoFear,60000);
</script>

</body>
</html>
