<script>
async function fetchYahoo(symbol) {
  const yahooUrl =
    "https://query1.finance.yahoo.com/v8/finance/chart/" +
    encodeURIComponent(symbol) +
    "?range=5d&interval=1d";

  const proxyUrl =
    "https://api.allorigins.win/raw?url=" +
    encodeURIComponent(yahooUrl);

  const response = await fetch(proxyUrl);

  if (!response.ok) {
    throw new Error("Yahoo HTTP chyba: " + response.status);
  }

  const data = await response.json();
  const result = data?.chart?.result?.[0];

  if (!result) {
    throw new Error("Yahoo neposlal údaje pre " + symbol);
  }

  const quote = result.indicators.quote[0];
  const values = [];

  for (let i = 0; i < quote.close.length; i++) {
    if (
      Number.isFinite(quote.open[i]) &&
      Number.isFinite(quote.close[i])
    ) {
      values.push({
        open: quote.open[i],
        close: quote.close[i]
      });
    }
  }

  if (!values.length) {
    throw new Error("Chýbajú cenové údaje pre " + symbol);
  }

  return values[values.length - 1];
}

async function loadStooqMarket() {
  try {
    const [vix, spy] = await Promise.all([
      fetchYahoo("^VIX"),
      fetchYahoo("SPY")
    ]);

    /* VIX */
    latestVix = vix.close;

    document.getElementById("vixValue").textContent =
      latestVix.toFixed(2);

    let vixText;
    let vixColor;

    if (latestVix < 15) {
      vixText = "VERY LOW FEAR";
      vixColor = "green";
    } else if (latestVix < 20) {
      vixText = "LOW VOLATILITY";
      vixColor = "green";
    } else if (latestVix < 30) {
      vixText = "ELEVATED RISK";
      vixColor = "orange";
    } else {
      vixText = "HIGH FEAR 🔴";
      vixColor = "red";
    }

    const vixStatus = document.getElementById("vixStatus");
    vixStatus.textContent = vixText;
    vixStatus.className = "status " + vixColor;

    /* SPY */
    latestSpyChange =
      ((spy.close - spy.open) / spy.open) * 100;

    const spyColor =
      latestSpyChange > 0.30
        ? "green"
        : latestSpyChange < -0.30
          ? "red"
          : "orange";

    document.getElementById("spyValue").textContent =
      (latestSpyChange >= 0 ? "▲ " : "▼ ") +
      latestSpyChange.toFixed(2) +
      "%";

    document.getElementById("spyValue").className =
      "value " + spyColor;

    const spyStatus = document.getElementById("spyStatus");

    if (latestSpyChange > 0.30) {
      spyStatus.textContent = "RISK ON 🟢";
    } else if (latestSpyChange < -0.30) {
      spyStatus.textContent = "RISK OFF 🔴";
    } else {
      spyStatus.textContent = "NEUTRAL";
    }

    spyStatus.className = "status " + spyColor;
  } catch (error) {
    console.error("Market data error:", error);

    document.getElementById("vixStatus").textContent =
      "Data unavailable";

    document.getElementById("spyStatus").textContent =
      "Data unavailable";
  }
}
</script>
