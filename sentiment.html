<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAPE Market Sentiment</title>

<style>
html, body{margin:0;padding:0;background:transparent;font-family:Arial, Helvetica, sans-serif;color:#222;}
.container{width:100%;max-width:900px;box-sizing:border-box;padding:0;}
.title{font-size:11px;font-weight:bold;letter-spacing:.8px;margin-bottom:6px;line-height:1.1;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 10px;}
.card{border-bottom:1px solid rgba(100,100,100,.22);padding:5px 4px;}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;line-height:1.15;}
.label{font-size:11px;color:#777;white-space:nowrap;}
.value{font-size:12px;font-weight:bold;white-space:nowrap;}
.status{font-size:10.5px;font-weight:bold;margin-top:3px;text-align:right;line-height:1.1;}
.green{color:#008000;}
.red{color:#c00000;}
.orange{color:#c87800;}
.neutral{color:#777;}
.meter-card{margin-top:6px;padding:5px 4px 0 4px;border-bottom:none;}
.meter-header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;}
.meter{height:8px;background:#ddd;border-radius:10px;overflow:hidden;}
.progress{height:100%;width:50%;background:#c87800;}
.scale{display:flex;justify-content:space-between;font-size:9.5px;margin-top:3px;color:#666;line-height:1.1;}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .label{font-size:10px;}
  .value{font-size:11px;}
  .status{font-size:9.5px;}
  .scale{font-size:9px;}
}
</style>
</head>

<body>

<div class="container">

  <div class="title">📊 MARKET SENTIMENT</div>

  <div class="grid">

    <div class="card">
      <div class="row">
        <div class="label">Crypto F&G</div>
        <div id="cryptoValue" class="value">--</div>
      </div>
      <div id="cryptoStatus" class="status neutral">Loading...</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">VIX</div>
        <div id="vixValue" class="value">--</div>
      </div>
      <div id="vixStatus" class="status neutral">Loading...</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">SPY Trend</div>
        <div id="spyValue" class="value">--</div>
      </div>
      <div id="spyStatus" class="status neutral">Loading...</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="label">Condition</div>
        <div id="conditionValue" class="value">--</div>
      </div>
      <div id="conditionStatus" class="status neutral">Loading...</div>
    </div>

  </div>

  <div class="meter-card">
    <div class="meter-header">
      <div class="label">Fear → Greed Meter</div>
    </div>

    <div class="meter">
      <div id="meter" class="progress"></div>
    </div>

    <div class="scale">
      <span>Extreme Fear</span>
      <span>Neutral</span>
      <span>Extreme Greed</span>
    </div>
  </div>

</div>

<script>
let latestCrypto = null;
let latestVix = null;
let latestSpyChange = null;

async function fetchTextWithProxy(url){
  const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
  const response = await fetch(proxyUrl);
  return await response.text();
}

async function loadCryptoFear(){
  try{
    const response = await fetch("https://api.alternative.me/fng/");
    const data = await response.json();
    const value = Number(data.data[0].value);

    latestCrypto = value;

    document.getElementById("cryptoValue").innerHTML = value;

    let text = "";
    let color = "";

    if(value < 25){ text = "EXTREME FEAR 🔴"; color = "red"; }
    else if(value < 50){ text = "FEAR"; color = "orange"; }
    else if(value < 75){ text = "GREED 🟢"; color = "green"; }
    else{ text = "EXTREME GREED 🔥"; color = "red"; }

    const status = document.getElementById("cryptoStatus");
    status.innerHTML = text;
    status.className = "status " + color;
  }
  catch(e){
    document.getElementById("cryptoStatus").innerHTML = "Data unavailable";
  }
}

async function loadStooqMarket(){
  try{
    const stooqUrl = "https://stooq.com/q/l/?s=vi.f,spy.us&f=sd2t2ohlcv&h&e=csv";
    const csv = await fetchTextWithProxy(stooqUrl);
    const rows = csv.trim().split("\n").slice(1);

    rows.forEach(row => {
      const cols = row.split(",");
      const symbol = cols[0].toLowerCase();
      const open = parseFloat(cols[3]);
      const close = parseFloat(cols[6]);

      if(symbol === "vi.f"){
        latestVix = close;
        document.getElementById("vixValue").innerHTML = close.toFixed(2);

        let text = "";
        let color = "";

        if(close < 15){ text = "VERY LOW FEAR"; color = "green"; }
        else if(close < 20){ text = "LOW VOLATILITY"; color = "green"; }
        else if(close < 30){ text = "ELEVATED RISK"; color = "orange"; }
        else{ text = "HIGH FEAR 🔴"; color = "red"; }

        const status = document.getElementById("vixStatus");
        status.innerHTML = text;
        status.className = "status " + color;
      }

      if(symbol === "spy.us"){
        const change = ((close - open) / open) * 100;
        latestSpyChange = change;

        document.getElementById("spyValue").innerHTML =
          (change >= 0 ? "▲ " : "▼ ") + change.toFixed(2) + "%";

        let text = "";
        let color = "";

        if(change > 0.30){ text = "RISK ON 🟢"; color = "green"; }
        else if(change < -0.30){ text = "RISK OFF 🔴"; color = "red"; }
        else{ text = "NEUTRAL"; color = "orange"; }

        const status = document.getElementById("spyStatus");
        status.innerHTML = text;
        status.className = "status " + color;
        document.getElementById("spyValue").className = "value " + color;
      }
    });
  }
  catch(e){
    document.getElementById("vixStatus").innerHTML = "Data unavailable";
    document.getElementById("spyStatus").innerHTML = "Data unavailable";
  }
}

function updateCondition(){
  if(latestCrypto === null && latestVix === null && latestSpyChange === null) return;

  let score = 50;

  if(latestCrypto !== null){
    score += (latestCrypto - 50) * 0.45;
  }

  if(latestVix !== null){
    if(latestVix < 15) score += 15;
    else if(latestVix < 20) score += 8;
    else if(latestVix < 30) score -= 10;
    else score -= 25;
  }

  if(latestSpyChange !== null){
    if(latestSpyChange > 0.30) score += 10;
    else if(latestSpyChange < -0.30) score -= 10;
  }

  score = Math.max(0, Math.min(100, Math.round(score)));

  let condition = "";
  let status = "";
  let color = "";

  if(score < 25){
    condition = "Fear";
    status = "Risk Off 🔴";
    color = "red";
  }
  else if(score < 45){
    condition = "Caution";
    status = "Defensive";
    color = "orange";
  }
  else if(score < 60){
    condition = "Neutral";
    status = "Balanced";
    color = "orange";
  }
  else if(score < 80){
    condition = "Greed";
    status = "Risk On 🟢";
    color = "green";
  }
  else{
    condition = "Extreme Greed";
    status = "Watch Levels";
    color = "red";
  }

  document.getElementById("conditionValue").innerHTML = condition;

  const conditionStatus = document.getElementById("conditionStatus");
  conditionStatus.innerHTML = status;
  conditionStatus.className = "status " + color;

  const meter = document.getElementById("meter");
  meter.style.width = score + "%";

  if(score < 45){ meter.style.background = "#c00000"; }
  else if(score < 60){ meter.style.background = "#c87800"; }
  else if(score < 80){ meter.style.background = "#4caf50"; }
  else{ meter.style.background = "#c87800"; }
}

async function loadAll(){
  await Promise.all([
    loadCryptoFear(),
    loadStooqMarket()
  ]);

  updateCondition();
}

loadAll();
setInterval(loadAll,300000);
</script>

</body>
</html>
