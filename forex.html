<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GAPE Forex Market</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    .forex-box {
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
      padding: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .title {
      color: #222;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.8px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .updated {
      color: #888;
      font-size: 9px;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    .forex-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 10px;
    }

    .forex-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 4px;
      border-bottom: 1px solid rgba(100, 100, 100, 0.22);
      font-size: 11px;
      line-height: 1.15;
    }

    .left {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .name {
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }

    .symbol {
      color: #777;
      font-size: 10px;
      white-space: nowrap;
    }

    .price {
      min-width: 65px;
      font-size: 12px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .change {
      width: 62px;
      font-size: 10.5px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .loading,
    .error {
      grid-column: 1 / -1;
      padding: 5px 4px;
      color: #777;
      font-size: 11px;
    }

    .green {
      color: #008000;
    }

    .red {
      color: #c00000;
    }

    .neutral {
      color: #777;
    }

    @media (max-width: 600px) {
      .forex-grid {
        gap: 6px 8px;
      }

      .forex-row {
        gap: 5px;
        padding: 5px 3px;
      }

      .name {
        font-size: 10px;
      }

      .symbol {
        font-size: 9px;
      }

      .price {
        min-width: 52px;
        font-size: 11px;
      }

      .change {
        width: 54px;
        font-size: 9.5px;
      }

      .updated {
        font-size: 8.5px;
      }
    }

    @media (max-width: 430px) {
      .symbol {
        display: none;
      }

      .forex-row {
        gap: 4px;
      }

      .price {
        min-width: 48px;
      }

      .change {
        width: 51px;
      }
    }
  </style>
</head>

<body>

  <div class="forex-box">

    <div class="title-row">

      <div class="title">
        💱 FOREX MARKET
      </div>

      <div id="updated" class="updated">
        Načítavam...
      </div>

    </div>

    <div id="forex" class="forex-grid">

      <div class="loading">
        Načítavam aktuálne kurzy...
      </div>

    </div>

  </div>

  <script>
    "use strict";

    const currencyPairs = [
      {
        name: "EUR/USD",
        symbol: "EURUSD",
        yahoo: "EURUSD=X",
        decimals: 4
      },
      {
        name: "GBP/USD",
        symbol: "GBPUSD",
        yahoo: "GBPUSD=X",
        decimals: 4
      },
      {
        name: "USD/JPY",
        symbol: "USDJPY",
        yahoo: "JPY=X",
        decimals: 2
      },
      {
        name: "USD/CHF",
        symbol: "USDCHF",
        yahoo: "CHF=X",
        decimals: 4
      },
      {
        name: "AUD/USD",
        symbol: "AUDUSD",
        yahoo: "AUDUSD=X",
        decimals: 4
      },
      {
        name: "USD/CAD",
        symbol: "USDCAD",
        yahoo: "CAD=X",
        decimals: 4
      },
      {
        name: "EUR/GBP",
        symbol: "EURGBP",
        yahoo: "EURGBP=X",
        decimals: 4
      },
      {
        name: "EUR/JPY",
        symbol: "EURJPY",
        yahoo: "EURJPY=X",
        decimals: 2
      }
    ];

    /*
     * Yahoo Finance blokuje priame požiadavky z GitHub Pages.
     * Preto použijeme niekoľko záložných CORS proxy serverov.
     */
    const proxyBuilders = [
      function (url) {
        return (
          "https://corsproxy.io/?url=" +
          encodeURIComponent(url)
        );
      },

      function (url) {
        return (
          "https://api.allorigins.win/raw?url=" +
          encodeURIComponent(url)
        );
      },

      function (url) {
        return (
          "https://r.jina.ai/http://" +
          url.replace(/^https?:\/\//, "")
        );
      }
    ];

    function fetchWithTimeout(url, timeout) {
      const controller = new AbortController();

      const timer = setTimeout(function () {
        controller.abort();
      }, timeout);

      return fetch(url, {
        cache: "no-store",
        signal: controller.signal
      }).finally(function () {
        clearTimeout(timer);
      });
    }

    async function fetchJsonWithFallback(url) {
      const errors = [];

      for (const buildProxyUrl of proxyBuilders) {
        try {
          const proxyUrl = buildProxyUrl(url);

          const response = await fetchWithTimeout(
            proxyUrl,
            12000
          );

          if (!response.ok) {
            throw new Error(
              "HTTP " + response.status
            );
          }

          let text = await response.text();

          /*
           * Jina pridáva pred JSON textový nadpis.
           * Pred spracovaním ho odstránime.
           */
          if (proxyUrl.includes("r.jina.ai")) {
            const marker =
              text.indexOf("Markdown Content:");

            if (marker !== -1) {
              text = text
                .substring(marker + 17)
                .trim();
            }
          }

          const firstBrace = text.indexOf("{");

          if (firstBrace > 0) {
            text = text.substring(firstBrace);
          }

          const data = JSON.parse(text);

          if (
            !data ||
            !data.chart ||
            !data.chart.result ||
            !data.chart.result[0]
          ) {
            throw new Error(
              "API vrátilo neplatné dáta"
            );
          }

          return data;
        } catch (error) {
          errors.push(error.message);
        }
      }

      throw new Error(
        errors.join(" | ")
      );
    }

    async function loadCurrencyPair(pair) {
      const yahooUrl =
        "https://query1.finance.yahoo.com/v8/finance/chart/" +
        encodeURIComponent(pair.yahoo) +
        "?range=5d&interval=1d&_=" +
        Date.now();

      const data =
        await fetchJsonWithFallback(yahooUrl);

      const result =
        data.chart.result[0];

      const meta =
        result.meta;

      if (
        !meta ||
        meta.symbol !== pair.yahoo
      ) {
        throw new Error(
          "Nesprávne dáta pre " + pair.yahoo
        );
      }

      let currentPrice =
        Number(meta.regularMarketPrice);

      let previousClose =
        Number(meta.chartPreviousClose);

      const quote =
        result.indicators &&
        result.indicators.quote &&
        result.indicators.quote[0];

      /*
       * Záloha, ak regularMarketPrice nie je dostupná.
       */
      if (
        !Number.isFinite(currentPrice) &&
        quote &&
        quote.close
      ) {
        for (
          let i = quote.close.length - 1;
          i >= 0;
          i--
        ) {
          const close =
            Number(quote.close[i]);

          if (Number.isFinite(close)) {
            currentPrice = close;
            break;
          }
        }
      }

      /*
       * Záloha pre predchádzajúcu zatváraciu cenu.
       */
      if (
        (
          !Number.isFinite(previousClose) ||
          previousClose === 0
        ) &&
        quote &&
        quote.close
      ) {
        const validCloses =
          quote.close
            .map(Number)
            .filter(Number.isFinite);

        if (validCloses.length >= 2) {
          previousClose =
            validCloses[
              validCloses.length - 2
            ];
        }
      }

      if (!Number.isFinite(currentPrice)) {
        throw new Error(
          "Cena nie je dostupná pre " +
          pair.yahoo
        );
      }

      let changePercent = null;

      if (
        Number.isFinite(previousClose) &&
        previousClose !== 0
      ) {
        changePercent =
          (
            (currentPrice - previousClose) /
            previousClose
          ) * 100;
      }

      return {
        name: pair.name,
        symbol: pair.symbol,
        yahoo: pair.yahoo,
        decimals: pair.decimals,
        price: currentPrice,
        previousClose: previousClose,
        changePercent: changePercent
      };
    }

    function renderCurrencyPair(pair) {
      let colorClass = "neutral";
      let arrow = "•";
      let changeText = "N/A";

      if (
        Number.isFinite(pair.changePercent)
      ) {
        changeText =
          Math.abs(
            pair.changePercent
          ).toFixed(2) + "%";

        if (pair.changePercent > 0) {
          colorClass = "green";
          arrow = "▲";
        } else if (
          pair.changePercent < 0
        ) {
          colorClass = "red";
          arrow = "▼";
        }
      }

      return `
        <div class="forex-row">

          <div class="left">
            <span class="name">
              ${pair.name}
            </span>

            <span class="symbol">
              (${pair.symbol})
            </span>
          </div>

          <div class="price">
            ${pair.price.toFixed(pair.decimals)}
          </div>

          <div class="change ${colorClass}">
            ${arrow} ${changeText}
          </div>

        </div>
      `;
    }

    function renderMissingPair(pair) {
      return `
        <div class="forex-row">

          <div class="left">
            <span class="name">
              ${pair.name}
            </span>

            <span class="symbol">
              (${pair.symbol})
            </span>
          </div>

          <div class="price neutral">
            N/A
          </div>

          <div class="change neutral">
            N/A
          </div>

        </div>
      `;
    }

    async function loadForex() {
      const forexContainer =
        document.getElementById("forex");

      const updatedElement =
        document.getElementById("updated");

      updatedElement.textContent =
        "Aktualizujem...";

      try {
        const results =
          await Promise.allSettled(
            currencyPairs.map(function (pair) {
              return loadCurrencyPair(pair);
            })
          );

        const loadedPairs =
          results
            .filter(function (result) {
              return result.status === "fulfilled";
            })
            .map(function (result) {
              return result.value;
            });

        if (loadedPairs.length === 0) {
          forexContainer.innerHTML = `
            <div class="error">
              Kurzové dáta momentálne nie sú dostupné.
            </div>
          `;

          updatedElement.textContent =
            "Dáta nedostupné";

          return;
        }

        const loadedSymbols =
          new Set(
            loadedPairs.map(function (pair) {
              return pair.yahoo;
            })
          );

        let html =
          loadedPairs
            .map(renderCurrencyPair)
            .join("");

        /*
         * Neúspešne načítané páry zobrazíme ako N/A.
         */
        html +=
          currencyPairs
            .filter(function (pair) {
              return !loadedSymbols.has(
                pair.yahoo
              );
            })
            .map(renderMissingPair)
            .join("");

        forexContainer.innerHTML = html;

        updatedElement.textContent =
          "Aktualizované: " +
          new Date().toLocaleTimeString(
            "sk-SK",
            {
              hour: "2-digit",
              minute: "2-digit"
            }
          );
      } catch (error) {
        console.error(
          "Forex widget chyba:",
          error
        );

        forexContainer.innerHTML = `
          <div class="error">
            Kurzové dáta momentálne nie sú dostupné.
          </div>
        `;

        updatedElement.textContent =
          "Dáta nedostupné";
      }
    }

    loadForex();

    /*
     * Aktualizácia každých 5 minút.
     */
    setInterval(
      loadForex,
      5 * 60 * 1000
    );
  </script>

</body>
</html>
