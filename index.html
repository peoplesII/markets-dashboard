<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomberg Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
}

.section {
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    margin-top: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

@media(max-width: 900px){
    .grid { grid-template-columns: 1fr; }
}

.card {
    border: 1px solid #e6e6e6;
    border-radius: 10px;
    padding: 10px;
    background: #fff;
}

.title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 14px;
    color: #222;
}
</style>

</head>

<body>

<div class="header">
📊 GLOBAL MARKETS DASHBOARD
</div>

<!-- INDICES -->
<div class="section">📈 Indices</div>
<div class="grid">

<div class="card">
<div class="title">S&P 500</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=SP:SPX&theme=light"
width="100%" height="300" frameborder="0"></iframe>
</div>

<div class="card">
<div class="title">NASDAQ 100</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:NDX&theme=light"
width="100%" height="300" frameborder="0"></iframe>
</div>

<div class="card">
<div class="title">Dow Jones</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=DJ:DJI&theme=light"
width="100%" height="300" frameborder="0"></iframe>
</div>

<div class="card">
<div class="title">DAX (Germany)</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=XETR:DAX&theme=light"
width="100%" height="300" frameborder="0"></iframe>
</div>

</div>

<!-- CRYPTO -->
<div class="section">🪙 Crypto</div>
<div class="grid">

<div class="card">
<div class="title">Bitcoin</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BTCUSD&theme=light"
width="100%" height="300"></iframe>
</div>

<div class="card">
<div class="title">Ethereum</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=ETHUSD&theme=light"
width="100%" height="300"></iframe>
</div>

</div>

<!-- COMMODITIES -->
<div class="section">🟡 Commodities</div>
<div class="grid">

<div class="card">
<div class="title">Gold</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=XAUUSD&theme=light"
width="100%" height="300"></iframe>
</div>

<div class="card">
<div class="title">Oil (WTI)</div>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=USOIL&theme=light"
width="100%" height="300"></iframe>
</div>

</div>

<!-- SENTIMENT -->
<div class="section">🔥 Market Sentiment</div>
<div class="grid">

<div class="card">
<div class="title">Fear & Greed Index</div>
<iframe src="https://edition.cnn.com/markets/fear-and-greed"
width="100%" height="300"></iframe>
</div>

<div class="card">
<div class="title">Market Overview</div>
<iframe src="https://www.tradingview.com/markets/"
width="100%" height="300"></iframe>
</div>

</div>

</body>
</html>
