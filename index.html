<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Markets Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<h1>📊 GAPE MARKETS</h1>

<p>
Live prehľad globálnych finančných trhov
</p>

</header>



<section class="ticker">

<div class="widget-title">
LIVE MARKET TICKER
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script 
type="text/javascript" 
src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" 
async>

{
"symbols": [
{
"proName": "FOREXCOM:SPXUSD",
"title": "S&P 500"
},
{
"proName": "NASDAQ:NDX",
"title": "NASDAQ 100"
},
{
"proName": "DJ:DJI",
"title": "Dow Jones"
},
{
"proName": "XETR:DAX",
"title": "DAX"
},
{
"proName": "BITSTAMP:BTCUSD",
"title": "Bitcoin"
},
{
"proName": "TVC:GOLD",
"title": "Gold"
}
],
"showSymbolLogo": true,
"colorTheme": "light",
"isTransparent": false,
"displayMode": "adaptive",
"locale": "en"
}

</script>

</div>


</section>




<section class="dashboard">


<div class="card">

<h2>📈 Globálne indexy</h2>

<div id="indices" class="mini-grid">


<div class="mini-card">

<h3>S&P 500</h3>

<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>

{
"symbol": "FOREXCOM:SPXUSD",
"width": "100%",
"height": "180",
"locale": "en",
"dateRange": "12M",
"colorTheme": "light",
"isTransparent": false
}

</script>

</div>

</div>



<div class="mini-card">

<h3>NASDAQ 100</h3>

<div class="tradingview-widget-container">

{
"symbol": "NASDAQ:NDX",
"width": "100%",
"height": "180",
"locale": "en",
"dateRange": "12M",
"colorTheme": "light"
}

</script>

</div>

</div>

<h3>Dow Jones</h3>

<div class="tradingview-widget-container">

<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

"width": "100%",
"height": "180",

</div>
