<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Index Dashboard</title>


<style>

body {

margin:0;
padding:10px;
background:white;
font-family:Arial, Helvetica, sans-serif;

}


.grid {

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;

}


.card {

border:1px solid #e2e2e2;
border-radius:8px;
background:white;
padding:6px;
height:210px;
overflow:hidden;

}


.title {

font-size:13px;
font-weight:bold;
margin-bottom:5px;
color:#222;

}



@media(max-width:1000px){

.grid{

grid-template-columns:repeat(2,1fr);

}

}



@media(max-width:600px){

.grid{

grid-template-columns:1fr;

}

}


</style>


</head>


<body>


<div class="grid">


<div class="card">

<div class="title">
S&P 500
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script 
src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js"
async>

{
"symbol":"FOREXCOM:SPXUSD",
"width":"100%",
"height":"170",
"dateRange":"3M",
"colorTheme":"light",
"isTransparent":true,
"locale":"sk"
}

</script>

</div>


</div>





<div class="card">

<div class="title">
NASDAQ 100
</div>


<div class="tradingview-widget-container">

async>

{

"height":"170",

"locale":"sk"

</div>

</div>

<div class="title">
Dow Jones

async>

</body>

</html>
