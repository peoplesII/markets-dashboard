<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Global Market Index Dashboard</title>


<style>

body {

margin:0;
padding:8px;
background:#ffffff;
font-family:Arial, Helvetica, sans-serif;

}


.grid {

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;

}


.card {

border:1px solid #e5e5e5;
border-radius:10px;
background:#ffffff;
padding:8px;
height:180px;
overflow:hidden;

}


.category {

font-size:10px;
font-weight:bold;
color:#777;
letter-spacing:0.8px;
text-transform:uppercase;
margin-bottom:2px;

}


.title {

font-size:14px;
font-weight:700;
color:#111;
margin-bottom:4px;

}


@media(max-width:1000px){

.grid {

grid-template-columns:repeat(2,1fr);

}

}


@media(max-width:600px){

.grid {

grid-template-columns:1fr;

}

}


</style>


</head>



<body>


<div class="grid">



<!-- S&P 500 -->

<div class="card">

<div class="category">
US LARGE CAP
</div>

<div class="title">
S&P 500
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>

{
"symbol":"FOREXCOM:SPXUSD",
"width":"100%",
"height":"145",
"dateRange":"3M",
"colorTheme":"light",
"isTransparent":true,
"locale":"sk"
}

</script>

</div>

</div>




<!-- Nasdaq -->

<div class="card">

<div class="category">
US TECHNOLOGY
</div>

<div class="title">
Nasdaq Composite
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>

{
"symbol":"NASDAQ:IXIC",
"width":"100%",
"height":"145",
"dateRange":"3M",
"colorTheme":"light",
"isTransparent":true,
"locale":"sk"
}

</script>

</div>

</div>




<!-- Dow Jones -->

<div class="card">

<div class="category">
US BLUE CHIPS
</div>

<div class="title">
Dow Jones
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>

{
"symbol":"INDEX:DJI",
"width":"100%",
"height":"145",
"dateRange":"3M",
"colorTheme":"light",
"isTransparent":true,
"locale":"sk"
}

</script>

</div>

</div>




<!-- DAX -->

<div class="card">

<div class="category">
EUROPE
</div>

<div class="title">
DAX 40
</div>


<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>

{
"symbol":"XETR:DAX",
"width":"100%",
"height":"145",
"dateRange":"3M",
"colorTheme":"light",
"isTransparent":true,
"locale":"sk"
}

</script>

</div>

</div>



</div>


</body>

</html>
