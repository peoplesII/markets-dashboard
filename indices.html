<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAPE Global Index Ticker</title>


<style>

body {

margin:0;
padding:0;
background:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;

}


.ticker {

height:55px;
display:flex;
align-items:center;
overflow:hidden;
white-space:nowrap;
border-top:1px solid #eeeeee;
border-bottom:1px solid #eeeeee;
background:#ffffff;

}


.ticker-track {

display:inline-flex;
animation:scroll 25s linear infinite;

}


.item {

font-size:13px;
font-weight:600;
padding:0 35px;
color:#222;

}


.category {

color:#777;
font-size:11px;
text-transform:uppercase;
letter-spacing:0.5px;

}


.separator {

color:#bbb;

}



@keyframes scroll {


from {

transform:translateX(100%);

}


to {

transform:translateX(-100%);

}


}



</style>


</head>


<body>


<div class="ticker">


<div class="ticker-track">


<div class="item">
<span class="category">US LARGE CAP:</span>
S&P 500
</div>


<div class="separator">
|
</div>


<div class="item">
<span class="category">US TECHNOLOGY:</span>
Nasdaq Composite
</div>


<div class="separator">
|
</div>


<div class="item">
<span class="category">US BLUE CHIPS:</span>
Dow Jones
</div>


<div class="separator">
|
</div>


<div class="item">
<span class="category">EUROPE:</span>
DAX 40
</div>


<div class="separator">
|
</div>


<div class="item">
<span class="category">GLOBAL:</span>
Market Overview
</div>



</div>


</div>


</body>


</html>
